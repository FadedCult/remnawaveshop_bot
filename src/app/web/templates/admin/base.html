<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "RemnaShop Admin" }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">REMNASHOP ADMIN</div>
      <a href="/admin/" class="{% if request.url.path == '/admin/' %}active{% endif %}">Дашборд</a>
      <a href="/admin/users" class="{% if '/admin/users' in request.url.path %}active{% endif %}">Пользователи</a>
      <a href="/admin/tariffs" class="{% if '/admin/tariffs' in request.url.path %}active{% endif %}">Тарифы</a>
      <a href="/admin/tickets" class="{% if '/admin/tickets' in request.url.path %}active{% endif %}">Поддержка и тикеты</a>
      <a href="/admin/messages" class="{% if '/admin/messages' in request.url.path %}active{% endif %}">Сообщения</a>
      <a href="/admin/surveys" class="{% if '/admin/surveys' in request.url.path %}active{% endif %}">Опросы</a>
      <a href="/admin/servers" class="{% if '/admin/servers' in request.url.path %}active{% endif %}">Сервера</a>
      <a href="/admin/system" class="{% if '/admin/system' in request.url.path %}active{% endif %}">Система</a>
      <a href="/admin/logout">Выход</a>
    </aside>
    <main class="content">
      <div class="topline">
        <h2>{{ title or "Админ-панель" }}</h2>
        <div class="muted">Администратор: {{ admin_login }}</div>
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
